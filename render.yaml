services:
  - type: web
    name: ai-tutor
    env: python
    region: oregon
    plan: free

    buildCommand: |
      pip install -r backend/requirements.txt && cd frontend && npm install && npm run build

    startCommand: |
      cd backend && uvicorn app:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: YOUTUBE_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.0"

    disk:
      name: ai-tutor-storage
      mountPath: /var/data
      sizeGB: 1
